<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Aplicação local-first para abastecimento doméstico rural com rotina de compras, inventário e protocolos da casa.">
<meta name="theme-color" content="#f5f7fa">
<meta name="mobile-web-app-capable" content="yes">
<title>Estoque da Casa</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --bg-soft: #edf3f8;
    --bg-strong: #dde6ee;
    --surface: #ffffff;
    --surface-soft: #f8fbfd;
    --surface-elevated: rgba(255, 255, 255, 0.8);
    --text: #16202a;
    --text-soft: #5f6d7a;
    --text-faint: #8b99a6;
    --line: rgba(95, 109, 122, 0.14);
    --line-strong: rgba(95, 109, 122, 0.24);
    --accent: #6f8fa8;
    --accent-strong: #44657f;
    --accent-soft: #dbe8f1;
    --accent-pale: #edf4f9;
    --ok: #3f8c77;
    --ok-soft: #ddf2eb;
    --warn: #d49b3b;
    --warn-soft: #fff2dc;
    --alert: #d96666;
    --alert-soft: #ffe6e6;
    --shadow-sm: 0 10px 24px rgba(73, 94, 114, 0.08);
    --shadow-md: 0 18px 44px rgba(73, 94, 114, 0.12);
    --radius-xl: 28px;
    --radius-lg: 24px;
    --radius-md: 18px;
    --radius-sm: 14px;
    --radius-pill: 999px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background: var(--bg);
    font: 500 15px/1.55 'Manrope', sans-serif;
  }

  button, input, textarea, select { font: inherit; }
  button { font-family: inherit; }

  .site-header {
    padding: 20px 20px 14px;
  }

  .site-header__shell,
  .chrome-shell,
  main,
  footer {
    width: min(1120px, calc(100% - 32px));
    margin: 0 auto;
  }

  .site-header__shell {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .eyebrow,
  .page-kicker,
  .mini-label,
  .table-head,
  .footer-meta,
  .nav-label {
    font: 500 11px/1.2 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }


  h1, h2, h3, h4, p { margin: 0; }

  h1 {
    font-size: clamp(1.4rem, 3vw, 1.8rem);
    line-height: 1.1;
    letter-spacing: -0.03em;
    font-weight: 800;
  }

  .brand-copy p {
    margin-top: 6px;
    max-width: 500px;
    color: var(--text-soft);
    font-size: 13px;
  }

  .brand-meta {
    display: flex;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 8px;
  }

  .meta-pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 10px;
    border-radius: var(--radius-pill);
    background: var(--surface-soft);
    border: 1px solid var(--line);
    color: var(--text-soft);
    font: 500 11px/1.1 'IBM Plex Mono', monospace;
  }

  .chrome-bar {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 12px 0 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }

  .chrome-shell {
    display: grid;
    gap: 14px;
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .search-shell {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 52px;
    padding: 0 14px 0 16px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--line);
  }

  .search-icon {
    color: var(--text-faint);
    font-size: 18px;
  }

  #global-search {
    flex: 1;
    min-width: 0;
    border: 0;
    background: transparent;
    color: var(--text);
    padding: 0;
    font-size: 15px;
  }

  #global-search::placeholder { color: var(--text-faint); }
  #global-search:focus { outline: none; }

  .search-clear,
  .top-action,
  .action-btn,
  .action-btn-secondary,
  .ghost-btn,
  .modal-actions button,
  .sheet-action {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 46px;
    border: 0;
    border-radius: 18px;
    cursor: pointer;
    transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }

  .search-clear {
    min-height: 36px;
    padding: 0 12px;
    background: var(--accent-pale);
    color: var(--accent-strong);
    font: 600 12px/1 'Manrope', sans-serif;
  }

  .top-action,
  .action-btn,
  .sheet-action {
    padding: 0 16px;
    background: var(--accent-strong);
    color: white;
  }

  .action-btn-secondary,
  .ghost-btn,
  .modal-actions button:last-child {
    padding: 0 16px;
    background: rgba(111, 143, 168, 0.12);
    color: var(--accent-strong);
  }

  .top-action:hover,
  .action-btn:hover,
  .action-btn-secondary:hover,
  .ghost-btn:hover,
  .modal-actions button:hover,
  .search-clear:hover,
  .sheet-action:hover {
    transform: translateY(-1px);
  }

  .desktop-nav { display: block; }

  #nav-tabs {
    display: inline-flex;
    gap: 4px;
    padding: 4px;
    border-radius: var(--radius-lg);
    background: var(--surface);
    border: 1px solid var(--line);
  }

  .nav-btn,
  .mobile-nav-btn {
    border: 0;
    background: transparent;
    color: var(--text-soft);
    cursor: pointer;
  }

  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 20px;
    font-weight: 700;
  }

  .nav-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    color: var(--accent-strong);
    font-size: 16px;
  }

  .nav-btn.active {
    background: var(--accent-soft);
    color: var(--accent-strong);
  }

  .nav-btn.active .nav-icon,
  .mobile-nav-btn.active .nav-icon {
    color: var(--accent-strong);
  }

  main {
    padding: 26px 0 120px;
  }

  .page {
    display: grid;
    gap: 18px;
  }

  .page-heading {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .page-kicker { color: var(--accent-strong); }

  .page-title {
    font-size: clamp(1.9rem, 3vw, 2.8rem);
    line-height: 1.02;
    letter-spacing: -0.04em;
    font-weight: 800;
  }

  .page-sub {
    max-width: 760px;
    color: var(--text-soft);
  }

  .panel,
  .hero-card,
  .summary-card,
  .focus-card,
  .cycle-card,
  .inventory-block,
  .inventory-card,
  .checklist-card,
  .meta-card,
  .protocol-callout,
  .system-hero,
  .search-result-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
  }

  .panel,
  .inventory-block,
  .checklist-card,
  .system-hero,
  .protocol-callout {
    padding: 22px;
  }

  .today-hero {
    display: grid;
    gap: 18px;
    grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.75fr);
  }

  .hero-card {
    padding: 24px;
    background: var(--surface-soft);
  }

  .hero-card h2,
  .system-hero h2 {
    margin-top: 10px;
    font-size: clamp(2rem, 3vw, 2.8rem);
    line-height: 0.98;
    letter-spacing: -0.05em;
  }

  .hero-card p,
  .system-hero p,
  .panel-copy {
    margin-top: 12px;
    color: var(--text-soft);
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
  }

  .hero-stats,
  .summary-grid,
  .system-grid {
    display: grid;
    gap: 14px;
  }

  .hero-stats,
  .summary-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .hero-stat,
  .summary-card,
  .meta-card,
  .storage-card,
  .governance-card,
  .phase-card {
    padding: 18px;
  }

  .hero-stat {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
  }

  .hero-stat strong,
  .summary-card strong,
  .meta-card strong {
    font-size: 2rem;
    line-height: 1;
    letter-spacing: -0.04em;
    font-weight: 800;
  }

  .mini-label { color: var(--text-faint); }

  .hero-stat span,
  .summary-card p,
  .meta-card p,
  .phase-card p,
  .storage-card p,
  .governance-card p {
    color: var(--text-soft);
    font-size: 13px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }

  .section-header h3 {
    font-size: 1.4rem;
    letter-spacing: -0.04em;
    font-weight: 800;
  }

  .section-link {
    color: var(--accent-strong);
    font-weight: 700;
    font-size: 14px;
  }

  .focus-grid,
  .search-results-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .focus-card,
  .search-result-card {
    padding: 18px;
  }

  .focus-top,
  .search-result-top,
  .inventory-card-head,
  .cycle-header,
  .checklist-head,
  .system-toolbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .focus-title,
  .search-result-title,
  .inventory-card-title {
    font-size: 1.05rem;
    line-height: 1.2;
    font-weight: 800;
  }

  .text-muted {
    color: var(--text-soft);
    font-size: 13px;
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .mini-tag,
  .unit-chip,
  .status-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-pill);
    font: 500 11px/1 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .mini-tag {
    padding: 7px 10px;
    background: rgba(111, 143, 168, 0.1);
    color: var(--accent-strong);
  }

  .status-badge {
    min-width: 96px;
    padding: 8px 12px;
  }

  .status-ok {
    color: var(--ok);
    background: var(--ok-soft);
  }

  .status-warn {
    color: #9a6a15;
    background: var(--warn-soft);
  }

  .status-alert {
    color: #b23f3f;
    background: var(--alert-soft);
  }

  .summary-card {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .summary-card-alert {
    background: var(--alert-soft);
  }

  .summary-card-warn {
    background: var(--warn-soft);
  }

  .summary-card-balance {
    background: var(--accent-soft);
  }

  .summary-card-sub {
    color: var(--text-soft);
    font-size: 13px;
  }

  .summary-card-label,
  .meta-card-label {
    color: var(--text-faint);
    font: 500 11px/1.2 'IBM Plex Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .inventory-layout,
  .system-layout,
  .protocol-layout,
  .purchase-layout {
    display: grid;
    gap: 18px;
  }

  .inventory-overview,
  .purchase-overview {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .inventory-group-stack,
  .cycle-list,
  .checklist-items {
    display: grid;
    gap: 14px;
  }

  .inventory-block h3,
  .cycle-card h3,
  .protocol-callout h3,
  .checklist-card h3,
  .system-hero h3 {
    font-size: 1.3rem;
    line-height: 1.1;
    letter-spacing: -0.03em;
    font-weight: 800;
  }

  .inventory-desktop { display: block; }
  .inventory-mobile-list { display: none; }

  .table-wrap {
    overflow-x: auto;
    margin-top: 12px;
  }

  .inventory-table {
    width: 100%;
    min-width: 780px;
    border-collapse: collapse;
  }

  .inventory-table th {
    padding: 12px 10px;
    border-bottom: 1px solid var(--line);
    color: var(--text-faint);
    text-align: left;
    font: 500 11px/1.2 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .inventory-table td {
    padding: 14px 10px;
    border-bottom: 1px solid rgba(95, 109, 122, 0.08);
    vertical-align: top;
  }

  .inventory-table tr:last-child td { border-bottom: 0; }

  .item-name {
    font-weight: 800;
    font-size: 15px;
    line-height: 1.25;
  }

  .item-note {
    margin-top: 6px;
    color: var(--text-soft);
    font-size: 13px;
  }

  .item-meta {
    color: var(--text-soft);
    font: 500 12px/1.4 'IBM Plex Mono', monospace;
  }

  .stock-field {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 48px;
    padding: 6px;
    border-radius: 18px;
    background: var(--surface);
    border: 1px solid var(--line);
  }

  .stock-input {
    width: 88px;
    border: 0;
    background: transparent;
    color: var(--text);
    padding: 6px 8px;
    font: 600 14px/1 'IBM Plex Mono', monospace;
  }

  .stock-input:focus { outline: none; }

  .unit-chip {
    min-height: 34px;
    padding: 0 12px;
    background: var(--accent-pale);
    color: var(--accent-strong);
  }

  .coverage-block {
    display: grid;
    gap: 5px;
  }

  .coverage-main {
    color: var(--text);
    font: 600 13px/1.35 'IBM Plex Mono', monospace;
  }

  .coverage-sub {
    color: var(--text-soft);
    font-size: 12px;
  }

  .inventory-card {
    padding: 18px;
  }

  .inventory-card-body {
    display: grid;
    gap: 14px;
    margin-top: 14px;
  }

  .inventory-card-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .inventory-card-meta {
    padding: 14px;
    border-radius: var(--radius-sm);
    background: var(--surface-soft);
    border: 1px solid var(--line);
  }

  .cycle-grid {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .cycle-card {
    padding: 20px;
  }

  .cycle-list {
    margin-top: 16px;
  }

  .cycle-item {
    display: grid;
    gap: 6px;
    padding: 12px 0;
    border-top: 1px solid rgba(95, 109, 122, 0.1);
  }

  .cycle-item:first-child { border-top: 0; padding-top: 0; }

  .cycle-item-main {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .cycle-item-title {
    font-weight: 800;
  }

  .protocol-callout {
    background: var(--surface-soft);
  }

  .checklist-grid {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .checklist-card {
    display: grid;
    gap: 16px;
  }

  .progress-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 58px;
    min-height: 32px;
    padding: 0 10px;
    border-radius: var(--radius-pill);
    background: rgba(111, 143, 168, 0.12);
    color: var(--accent-strong);
    font: 500 11px/1 'IBM Plex Mono', monospace;
  }

  .progress-chip.done {
    background: var(--ok-soft);
    color: var(--ok);
  }

  .progress-chip.partial {
    background: var(--warn-soft);
    color: #9a6a15;
  }

  .check-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .check-box {
    width: 24px;
    height: 24px;
    min-width: 24px;
    margin-top: 1px;
    border: 1px solid var(--line-strong);
    border-radius: 9px;
    background: var(--surface);
    color: var(--ok);
    cursor: pointer;
  }

  .check-box.checked {
    background: var(--ok-soft);
    border-color: rgba(63, 140, 119, 0.26);
  }

  .check-text {
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
  }

  .system-layout {
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
    align-items: start;
  }

  .system-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .meta-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
  }

  .meta-card strong {
    display: block;
    font-size: 15px;
    line-height: 1.3;
    font-weight: 800;
  }

  .system-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }

  footer {
    padding: 0 0 104px;
    color: var(--text-faint);
    font: 500 11px/1.5 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  #shopping-modal {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(14, 24, 34, 0.4);
  }

  #shopping-modal[hidden] { display: none; }

  .modal-box {
    width: min(720px, 100%);
    padding: 26px;
    border-radius: var(--radius-lg);
    background: var(--surface);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
  }

  .modal-box h3 {
    font-size: 1.8rem;
    line-height: 1;
    letter-spacing: -0.04em;
    font-weight: 800;
  }

  #shopping-list-text {
    min-height: 280px;
    margin-top: 18px;
    padding: 18px;
    border-radius: 22px;
    background: var(--surface-soft);
    border: 1px solid var(--line);
    white-space: pre-wrap;
    color: var(--text);
    font: 500 12px/1.7 'IBM Plex Mono', monospace;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
  }

  .app-toast {
    position: fixed;
    right: 18px;
    bottom: 98px;
    z-index: 50;
    max-width: min(320px, calc(100vw - 36px));
    padding: 14px 16px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid var(--line);
    box-shadow: var(--shadow-md);
    color: var(--text);
    font: 500 12px/1.5 'IBM Plex Mono', monospace;
  }

  .app-toast-success {
    border-color: rgba(63, 140, 119, 0.22);
    background: rgba(247, 255, 251, 0.98);
  }

  .app-toast-warn {
    border-color: rgba(212, 155, 59, 0.22);
    background: rgba(255, 250, 242, 0.98);
  }

  .app-toast-error {
    border-color: rgba(217, 102, 102, 0.24);
    background: rgba(255, 245, 245, 0.98);
  }

  .mobile-nav {
    display: none;
  }

  #bottom-nav {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }

  .mobile-nav-btn {
    display: grid;
    justify-items: center;
    gap: 6px;
    padding: 12px 6px 10px;
    border-radius: 20px;
    font: 600 11px/1 'Manrope', sans-serif;
  }

  .mobile-nav-btn.active {
    background: rgba(111, 143, 168, 0.16);
    color: var(--text);
  }

  .page-empty {
    padding: 26px;
    border-radius: var(--radius-lg);
    background: var(--surface-soft);
    border: 1px dashed var(--line-strong);
    color: var(--text-soft);
  }

  /* Bottom sheet for item editing */
  .item-sheet {
    position: fixed;
    inset: 0;
    z-index: 45;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .item-sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(14, 24, 34, 0.35);
  }

  .item-sheet-box {
    position: relative;
    width: 100%;
    max-width: 480px;
    padding: 20px 24px 32px;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    background: var(--surface);
    box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
  }

  .item-sheet-handle {
    width: 36px;
    height: 4px;
    margin: 0 auto 16px;
    border-radius: 2px;
    background: var(--line-strong);
  }

  .item-sheet-title {
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 4px;
  }

  .item-sheet-meta {
    color: var(--text-soft);
    font-size: 13px;
    margin-bottom: 20px;
  }

  .item-sheet-input-group {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .item-sheet-step {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: var(--surface-soft);
    color: var(--accent-strong);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: background 140ms ease;
  }

  .item-sheet-step:active {
    background: var(--accent-soft);
  }

  .item-sheet-input {
    width: 100px;
    border: 0;
    background: transparent;
    color: var(--text);
    text-align: center;
    font: 700 2rem/1 'IBM Plex Mono', monospace;
    letter-spacing: -0.02em;
  }

  .item-sheet-input:focus { outline: none; }

  .item-sheet-unit {
    font: 500 14px/1 'IBM Plex Mono', monospace;
    color: var(--text-soft);
  }

  .item-sheet-info {
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
    padding: 14px;
    border-radius: var(--radius-sm);
    background: var(--surface-soft);
    border: 1px solid var(--line);
    font-size: 13px;
    color: var(--text-soft);
  }

  .item-sheet-info strong {
    display: block;
    color: var(--text);
    font-weight: 700;
  }

  [hidden] { display: none !important; }

  @media (max-width: 1080px) {
    .site-header__shell,
    .today-hero,
    .system-layout,
    .checklist-grid,
    .focus-grid,
    .search-results-grid,
    .inventory-overview,
    .purchase-overview,
    .cycle-grid,
    .hero-stats,
    .summary-grid {
      grid-template-columns: 1fr;
    }

    .system-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 820px) {
    .site-header {
      padding: 22px 16px 16px;
    }

    .site-header__shell,
    .chrome-shell,
    main,
    footer {
      width: min(100%, calc(100% - 24px));
    }

    .brand-copy p { font-size: 14px; }
    .desktop-nav { display: none; }

    .mobile-nav {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 30;
      display: block;
      padding: 8px;
      border-radius: var(--radius-lg);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-md);
    }

    .search-row {
      flex-direction: column;
      align-items: stretch;
    }

    .top-action { width: 100%; }

    main { padding-top: 20px; }

    .inventory-desktop { display: none; }
    .inventory-mobile-list { display: grid; gap: 12px; margin-top: 12px; }

    .inventory-card-grid { grid-template-columns: 1fr; }

    #shopping-modal {
      align-items: flex-end;
      padding: 0;
      background: rgba(14, 24, 34, 0.28);
    }

    .modal-box {
      width: 100%;
      padding: 22px 18px 18px;
      border-radius: 26px 26px 0 0;
      border-bottom: 0;
    }

    .modal-actions {
      flex-direction: column;
    }

    .modal-actions button {
      width: 100%;
    }
  }

  @media (max-width: 560px) {
    .focus-grid,
    .search-results-grid,
    .checklist-grid,
    .hero-stats,
    .summary-grid,
    .inventory-overview,
    .purchase-overview {
      grid-template-columns: 1fr;
    }

    .site-header__shell {
      flex-direction: column;
      align-items: flex-start;
    }

    .brand-meta {
      justify-content: flex-start;
    }

    .panel,
    .inventory-block,
    .checklist-card,
    .protocol-callout,
    .system-hero,
    .hero-card,
    .cycle-card {
      padding: 18px;
    }

    .hero-card h2,
    .system-hero h2 {
      font-size: 2rem;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <header class="site-header">
    <div class="site-header__shell">
      <div class="brand-copy">
        <h1>Estoque da Casa</h1>
        <p>Compras, estoque e protocolos da casa em uma interface clara e pronta para ação.</p>
      </div>
      <div class="brand-meta" id="header-meta"></div>
    </div>
  </header>

  <div class="chrome-bar">
    <div class="chrome-shell">
      <div class="search-row">
        <label class="search-shell" for="global-search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input id="global-search" type="search" placeholder="Buscar item, rotina ou ciclo" autocomplete="off">
          <button id="search-clear" class="search-clear" type="button" hidden>Limpar</button>
        </label>
        <button class="top-action" type="button" data-action="shopping-list">Lista rápida</button>
      </div>

      <nav class="desktop-nav" aria-label="Seções principais">
        <div id="nav-tabs" role="tablist" aria-label="Seções do sistema"></div>
      </nav>
    </div>
  </div>

  <main id="app-main"></main>

  <footer>
    Estoque da Casa · último registro <span id="state-last-updated">Nunca</span> · <span id="update-date"></span>
  </footer>

  <nav class="mobile-nav" aria-label="Navegação principal mobile">
    <div id="bottom-nav"></div>
  </nav>

  <div id="shopping-modal" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="shopping-list-title">
      <h3 id="shopping-list-title">Lista de compras</h3>
      <pre id="shopping-list-text"></pre>
      <div class="modal-actions">
        <button type="button" data-action="copy-list">Copiar</button>
        <button type="button" data-action="modal-close">Fechar</button>
      </div>
    </div>
  </div>

  <div id="item-sheet" class="item-sheet" hidden>
    <div class="item-sheet-overlay"></div>
    <div class="item-sheet-box" role="dialog" aria-modal="true" aria-labelledby="sheet-item-name">
      <div class="item-sheet-handle"></div>
      <h3 id="sheet-item-name" class="item-sheet-title"></h3>
      <p id="sheet-item-meta" class="item-sheet-meta"></p>
      <div class="item-sheet-input-group">
        <button type="button" class="item-sheet-step" data-sheet-action="decrement" aria-label="Diminuir">−</button>
        <input id="sheet-stock-input" class="item-sheet-input" type="number" min="0" inputmode="decimal" aria-label="Quantidade">
        <span id="sheet-unit" class="item-sheet-unit"></span>
        <button type="button" class="item-sheet-step" data-sheet-action="increment" aria-label="Aumentar">+</button>
      </div>
      <div id="sheet-info" class="item-sheet-info"></div>
    </div>
  </div>

  <input id="backup-import-input" type="file" accept=".json,application/json" hidden>
  <div id="app-toast" class="app-toast" hidden aria-live="polite"></div>

  <script src="./domain.js"></script>
  <script src="./state.js"></script>
  <script src="./app.js"></script>
</body>
</html>
