<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Manual operacional de resiliência doméstica para abastecimento rural com restrições SG/SL.">
<meta name="theme-color" content="#1b1916">
<meta name="mobile-web-app-capable" content="yes">
<title>Codex de Resiliência Doméstica</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <div class="header-shell">
      <div class="header-copy">
        <div class="header-label">Local-first · offline</div>
        <h1>Codex Doméstico</h1>
      </div>
      <div class="header-meta" id="header-meta"></div>
    </div>
  </header>

  <nav>
    <div class="nav-shell">
      <div id="nav-tabs" role="tablist" aria-label="Seções do sistema"></div>
    </div>
  </nav>

  <main id="app-main"></main>

  <footer>
    Último registro <span id="state-last-updated">Nunca</span> · <span id="update-date"></span>
  </footer>

  <dialog id="shopping-modal" aria-labelledby="shopping-list-title">
    <h3 id="shopping-list-title">Lista de compras</h3>
    <pre id="shopping-list-text"></pre>
    <div class="modal-actions">
      <button type="button" data-action="copy-list">Copiar</button>
      <button type="button" data-action="modal-close">Fechar</button>
    </div>
  </dialog>

  <input id="backup-import-input" type="file" accept=".json,application/json" hidden>
  <div id="app-toast" class="app-toast" hidden aria-live="polite"></div>

  <script src="./domain.js"></script>
  <script src="./state.js"></script>
  <script src="./utils.js"></script>
  <script src="./app.js"></script>
</body>
</html>
