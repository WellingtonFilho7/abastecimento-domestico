<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Controle de abastecimento doméstico local-first.">
<meta name="theme-color" content="#f5f7fa">
<meta name="mobile-web-app-capable" content="yes">
<title>Estoque da Casa</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icons/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-soft: #f0f4f8;
    --text: #1a2332;
    --text-soft: #5f6d7a;
    --text-faint: #8b99a6;
    --line: rgba(95, 109, 122, 0.13);
    --accent: #44657f;
    --accent-soft: #dbe8f1;
    --ok: #2e7d62;
    --ok-soft: #ddf2eb;
    --warn: #b5841e;
    --warn-soft: #fff2dc;
    --alert: #c24444;
    --alert-soft: #ffe6e6;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background: var(--bg);
    font: 500 14px/1.5 'Manrope', sans-serif;
    padding-bottom: 72px;
  }

  button, input, textarea, select { font: inherit; }

  h1, h2, h3, p { margin: 0; }

  /* ===== Header ===== */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 960px;
    margin: 0 auto;
    padding: 14px 16px;
  }

  .app-header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  /* ===== Navigation ===== */
  .app-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }

  .nav-shell {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px;
  }

  #nav-tabs {
    display: flex;
    gap: 2px;
    padding: 6px 0 0;
  }

  .nav-btn {
    border: 0;
    background: transparent;
    color: var(--text-soft);
    padding: 10px 16px 8px;
    cursor: pointer;
    font: 600 13px/1 'Manrope', sans-serif;
    border-bottom: 2px solid transparent;
    transition: color 120ms;
  }

  .nav-btn:hover { color: var(--text); }

  .nav-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ===== Main ===== */
  main {
    max-width: 960px;
    margin: 0 auto;
    padding: 16px 16px 24px;
  }

  .page { display: grid; gap: 16px; }

  .page-title {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* ===== Cards ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }

  .card h3 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* ===== Summary chips ===== */
  .summary-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .summary-chip {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
  }

  .summary-chip strong {
    font: 700 1.1rem/1 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }

  .summary-chip span {
    font-size: 11px;
    color: var(--text-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chip-alert strong { color: var(--alert); }
  .chip-warn strong { color: var(--warn); }
  .chip-ok strong { color: var(--ok); }

  /* ===== Search ===== */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    min-height: 40px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
  }

  .search-bar input {
    flex: 1;
    border: 0;
    background: transparent;
    padding: 0;
    color: var(--text);
    font-size: 14px;
    min-width: 0;
  }

  .search-bar input::placeholder { color: var(--text-faint); }
  .search-bar input:focus { outline: none; }

  .search-icon { color: var(--text-faint); font-size: 14px; }

  /* ===== Inventory groups ===== */
  .group-header {
    font: 600 11px/1 'IBM Plex Mono', monospace;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 0 6px;
    border-bottom: 1px solid var(--line);
  }

  .item-list { display: flex; flex-direction: column; gap: 2px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }

  .item-row:last-child { border-bottom: 0; }

  .item-name {
    flex: 1;
    min-width: 0;
    font-weight: 600;
    font-size: 14px;
  }

  .item-stock {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stock-input {
    width: 56px;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 6px 8px;
    background: var(--surface);
    color: var(--text);
    font: 500 14px/1 'IBM Plex Mono', monospace;
    text-align: center;
  }

  .stock-input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

  .unit-label {
    font: 500 11px/1 'IBM Plex Mono', monospace;
    color: var(--text-faint);
    min-width: 28px;
  }

  .item-coverage {
    font: 500 12px/1 'IBM Plex Mono', monospace;
    color: var(--text-soft);
    min-width: 36px;
    text-align: right;
  }

  /* ===== Badges ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: 6px;
    font: 500 10px/1 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .badge-ok { background: var(--ok-soft); color: var(--ok); }
  .badge-warn { background: var(--warn-soft); color: var(--warn); }
  .badge-alert { background: var(--alert-soft); color: var(--alert); }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 0;
    border-radius: 8px;
    padding: 10px 16px;
    min-height: 40px;
    cursor: pointer;
    font: 600 13px/1 'Manrope', sans-serif;
    transition: opacity 120ms;
  }

  .btn:hover { opacity: 0.85; }

  .btn-primary { background: var(--accent); color: white; }
  .btn-secondary { background: var(--surface); border: 1px solid var(--line); color: var(--text); }
  .btn-danger { background: var(--alert-soft); color: var(--alert); }
  .btn-sm { padding: 6px 12px; min-height: 32px; font-size: 12px; }
  .btn-block { width: 100%; }

  /* ===== Checklist ===== */
  .check-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 0;
  }

  .check-box {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border: 1.5px solid var(--line);
    border-radius: 7px;
    background: var(--surface);
    color: var(--ok);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .check-box.checked {
    background: var(--ok-soft);
    border-color: rgba(46, 125, 98, 0.3);
  }

  .check-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    padding-top: 2px;
  }

  .progress-tag {
    font: 500 11px/1 'IBM Plex Mono', monospace;
    padding: 4px 8px;
    border-radius: 6px;
    background: var(--surface-soft);
    color: var(--text-soft);
  }

  .progress-done { background: var(--ok-soft); color: var(--ok); }
  .progress-partial { background: var(--warn-soft); color: var(--warn); }

  /* ===== Shopping ===== */
  .shopping-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
    cursor: pointer;
  }

  .shopping-item:last-child { border-bottom: 0; }

  .shopping-check {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border: 1.5px solid var(--line);
    border-radius: 7px;
    background: var(--surface);
    color: var(--ok);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
  }

  .shopping-done .shopping-check {
    background: var(--ok-soft);
    border-color: rgba(46, 125, 98, 0.3);
  }

  .shopping-done { opacity: 0.5; }
  .shopping-done .shopping-item-name { text-decoration: line-through; }

  .shopping-item-info { flex: 1; min-width: 0; }

  .shopping-item-name {
    font-weight: 600;
    font-size: 14px;
  }

  .shopping-item-qty {
    font: 500 11px/1.4 'IBM Plex Mono', monospace;
    color: var(--text-soft);
  }

  /* ===== Modal ===== */
  #shopping-modal {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0, 0, 0, 0.3);
  }

  #shopping-modal[hidden] { display: none; }

  .modal-box {
    width: 100%;
    max-width: 600px;
    padding: 20px;
    border-radius: 16px 16px 0 0;
    background: var(--surface);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
  }

  .modal-box h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  #shopping-list-text {
    min-height: 160px;
    padding: 14px;
    border-radius: 8px;
    background: var(--surface-soft);
    border: 1px solid var(--line);
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    font: 400 12px/1.7 'IBM Plex Mono', monospace;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .modal-actions button {
    flex: 1;
    border: 0;
    border-radius: 8px;
    padding: 12px 16px;
    min-height: 44px;
    cursor: pointer;
    font: 600 13px/1 'Manrope', sans-serif;
  }

  .modal-actions button:first-child { background: var(--accent); color: white; }
  .modal-actions button:last-child { background: var(--surface-soft); color: var(--text); }

  /* ===== Bottom sheet ===== */
  .item-sheet {
    position: fixed;
    inset: 0;
    z-index: 45;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .item-sheet-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.3);
  }

  .item-sheet-box {
    position: relative;
    width: 100%;
    max-width: 480px;
    padding: 16px 20px 28px;
    border-radius: 16px 16px 0 0;
    background: var(--surface);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.1);
  }

  .item-sheet-handle {
    width: 32px;
    height: 4px;
    margin: 0 auto 14px;
    border-radius: 2px;
    background: var(--line);
  }

  .item-sheet-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .item-sheet-meta {
    color: var(--text-soft);
    font-size: 12px;
    margin-bottom: 18px;
  }

  .item-sheet-input-group {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .item-sheet-step {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: var(--surface-soft);
    color: var(--accent);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
  }

  .item-sheet-input {
    width: 80px;
    border: 0;
    background: transparent;
    color: var(--text);
    text-align: center;
    font: 700 1.8rem/1 'IBM Plex Mono', monospace;
  }

  .item-sheet-input:focus { outline: none; }

  .item-sheet-unit {
    font: 500 13px/1 'IBM Plex Mono', monospace;
    color: var(--text-soft);
  }

  .item-sheet-info {
    display: grid;
    gap: 6px;
    grid-template-columns: 1fr 1fr;
    padding: 12px;
    border-radius: 8px;
    background: var(--surface-soft);
    font-size: 12px;
    color: var(--text-soft);
  }

  .item-sheet-info strong {
    display: block;
    color: var(--text);
    font-weight: 600;
    font-size: 13px;
  }

  .item-sheet-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface-soft);
  }

  .item-sheet-price-label {
    font-size: 12px;
    color: var(--text-soft);
  }

  .item-sheet-price-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .item-sheet-price-prefix {
    font: 500 13px/1 'IBM Plex Mono', monospace;
    color: var(--text-soft);
  }

  .item-sheet-price-input {
    width: 72px;
    border: 0;
    background: transparent;
    text-align: right;
    font: 600 14px/1 'IBM Plex Mono', monospace;
    color: var(--text);
  }

  .item-sheet-price-input:focus { outline: none; }

  /* ===== Toast ===== */
  .app-toast {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 80px;
    z-index: 50;
    max-width: 360px;
    margin: 0 auto;
    padding: 12px 16px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    color: var(--text);
    font: 500 13px/1.4 'Manrope', sans-serif;
    text-align: center;
  }

  .app-toast-success { border-left: 3px solid var(--ok); }
  .app-toast-warn { border-left: 3px solid var(--warn); }
  .app-toast-error { border-left: 3px solid var(--alert); }

  /* ===== Footer ===== */
  footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 24px;
    color: var(--text-faint);
    font: 400 11px/1.5 'IBM Plex Mono', monospace;
  }

  /* ===== Empty state ===== */
  .empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--text-soft);
    font-size: 13px;
  }

  [hidden] { display: none !important; }

  /* ===== Desktop ===== */
  @media (min-width: 640px) {
    body { padding-bottom: 0; }

    .summary-row { max-width: 480px; }

    .item-row {
      gap: 16px;
    }

    .item-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-row:hover { background: var(--surface-soft); margin: 0 -8px; padding-left: 8px; padding-right: 8px; border-radius: 6px; }

    .btn-block { width: auto; }

    .modal-box { border-radius: 16px; margin-bottom: 10vh; }

    .app-toast {
      left: auto;
      right: 16px;
      bottom: 16px;
      max-width: 280px;
      text-align: left;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
  <header class="app-header">
    <h1>Estoque da Casa</h1>
    <div class="header-actions">
      <button class="btn btn-sm btn-primary" type="button" data-action="shopping-list">Lista rápida</button>
    </div>
  </header>

  <nav class="app-nav" aria-label="Seções">
    <div class="nav-shell">
      <div id="nav-tabs" role="tablist"></div>
    </div>
  </nav>

  <main id="app-main"></main>

  <footer>
    Estoque da Casa · <span id="state-last-updated">Nunca</span>
  </footer>

  <div id="shopping-modal" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="shopping-list-title">
      <h3 id="shopping-list-title">Lista de compras</h3>
      <pre id="shopping-list-text"></pre>
      <div class="modal-actions">
        <button type="button" data-action="copy-list">Copiar</button>
        <button type="button" data-action="modal-close">Fechar</button>
      </div>
    </div>
  </div>

  <div id="item-sheet" class="item-sheet" hidden>
    <div class="item-sheet-overlay"></div>
    <div class="item-sheet-box" role="dialog" aria-modal="true" aria-labelledby="sheet-item-name">
      <div class="item-sheet-handle"></div>
      <h3 id="sheet-item-name" class="item-sheet-title"></h3>
      <p id="sheet-item-meta" class="item-sheet-meta"></p>
      <div class="item-sheet-input-group">
        <button type="button" class="item-sheet-step" data-sheet-action="decrement" aria-label="Diminuir">−</button>
        <input id="sheet-stock-input" class="item-sheet-input" type="number" min="0" inputmode="decimal" aria-label="Quantidade">
        <span id="sheet-unit" class="item-sheet-unit"></span>
        <button type="button" class="item-sheet-step" data-sheet-action="increment" aria-label="Aumentar">+</button>
      </div>
      <div class="item-sheet-price-row">
        <span class="item-sheet-price-label">Preço estimado por unidade</span>
        <div class="item-sheet-price-input-wrap">
          <span class="item-sheet-price-prefix">R$</span>
          <input id="sheet-price-input" class="item-sheet-price-input" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0,00" aria-label="Preço estimado">
        </div>
      </div>
      <div id="sheet-info" class="item-sheet-info"></div>
    </div>
  </div>

  <input id="backup-import-input" type="file" accept=".json,application/json" hidden>
  <div id="app-toast" class="app-toast" hidden aria-live="polite"></div>

  <script src="./domain.js"></script>
  <script src="./state.js"></script>
  <script src="./app.js"></script>
</body>
</html>
